version: 2
updates:
  # GitHub Actions: track action versions across workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    # Wait 7 days after a release before opening an update PR. Mitigates
    # supply-chain risk by giving time for malicious releases to be flagged
    # and yanked before they propagate here.
    cooldown:
      default-days: 7
    # Skip patch-level Action updates — they're almost always non-functional
    # changes to the action's own README or CI. Security advisories fire on
    # a separate channel regardless of this filter.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 5

  # Python dependencies via uv (pyproject.toml + uv.lock).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    groups:
      python:
        patterns: ["*"]
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 5
