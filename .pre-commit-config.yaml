default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # list of supported hooks: https://pre-commit.com/hooks.html
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-docstring-first
      - id: check-yaml
      - id: debug-statements
      - id: detect-private-key
      - id: check-executables-have-shebangs
      - id: check-toml
      - id: check-json
      - id: check-xml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: [--maxkb, "800"]

  # python code formatting, linting, and import sorting using ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.10
    hooks:
      # Run the formatter
      - id: ruff-format
      # Run the linter
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]

  # python docstring formatting
  - repo: https://github.com/myint/docformatter
    rev: v1.7.7
    hooks:
      - id: docformatter
        args: [--in-place, --wrap-summaries=110, --wrap-descriptions=110]

  # yaml formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types: [yaml]
        exclude: "environment.yaml"

  # shell scripts linter
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  # GitHub Actions workflow linter (catches expression typos, bad action inputs,
  # invalid runner labels, shell errors in `run:` blocks via shellcheck, etc.)
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Keep uv.lock in sync with pyproject.toml. Without this hook it is easy to
  # change a dependency and forget to regenerate the lockfile, breaking
  # reproducibility for collaborators and CI.
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.13
    hooks:
      - id: uv-lock

  # Validate pyproject.toml against PEP 517/518/621 schemas. Catches typos and
  # structural errors (misspelled keys, wrong types, bad version specifiers)
  # that the basic `check-toml` hook silently accepts.
  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.25
    hooks:
      - id: validate-pyproject

  # Secret scanner. Far broader than detect-private-key (which only catches
  # SSH keys): ~100 rules for AWS, GCP, Stripe, Slack, generic API tokens, etc.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # Dependency hygiene: catches unused deps in pyproject.toml, imports of
  # packages not declared as deps, and transitive imports that should be
  # declared as direct deps. Runs via `uv` so it has access to the project's
  # resolved environment.
  - repo: local
    hooks:
      - id: deptry
        name: deptry
        entry: uv run --with deptry==0.25.1 deptry src
        language: system
        pass_filenames: false
        always_run: true

  # Security-focused GitHub Actions analyzer. Complements actionlint
  # (correctness-focused) — catches script injection via untrusted context,
  # unpinned third-party actions (supply-chain risk), excessive permissions,
  # credential persistence in checkout, GITHUB_TOKEN misuse, etc. Configured
  # in .github/zizmor.yml.
  - repo: https://github.com/woodruffw/zizmor-pre-commit
    rev: v1.24.1
    hooks:
      - id: zizmor

  # md formatting
  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.22
    hooks:
      - id: mdformat
        args: ["--number"]
        exclude: "^AGENTS\\.md$"
        # Pin all plugin versions. Unpinned, a new plugin release can reformat files
        # and fail pre-commit for reasons unrelated to the change under review.
        additional_dependencies:
          - mdformat-ruff==0.1.3
          - mdformat-gfm==1.0.0
          - mdformat-gfm-alerts==2.0.0
          - mdformat-tables==1.0.0
          - mdformat-frontmatter==2.0.10
          - mdformat-black==0.1.1
          - mdformat-config==0.2.1
          - mdformat-shfmt==0.2.0
          - mdformat-mkdocs==5.1.4
          - mdformat-toc==0.5.0
          # shfmt-py bundles the `shfmt` binary that mdformat-shfmt invokes.
          # Pinning here (and mirroring in pyproject.toml dev deps) keeps the
          # binary version stable across machines.
          - shfmt-py==3.12.0.2

  # word spelling linter
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args:
          - --skip=*.ipynb,*.bib,*.svg,pyproject.toml
          - --ignore-words-list=ehr,crate

  # jupyter notebook cell output clearing
  - repo: https://github.com/kynan/nbstripout
    rev: 0.8.1
    hooks:
      - id: nbstripout

  # jupyter notebook linting with ruff
  - repo: https://github.com/nbQA-dev/nbQA
    rev: 1.9.1
    hooks:
      - id: nbqa-ruff
        args: ["--fix"]
      - id: nbqa-ruff-format
        args: ["--line-length=110"]
